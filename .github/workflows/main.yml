# ==========================================
# FILE: .github/workflows/dotnet.yml
# ==========================================

name: C# Workflow

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  # Allows manual workflow execution
  workflow_dispatch:


jobs:
  build:

    runs-on: windows-latest

    # ==========================================
    # MATRIX STRATEGY
    # Builds multiple solutions/projects
    # ==========================================
    strategy:
      matrix:
        solution:
          - "Console Part 01.slnx"
          - "Part 2 WPF/WPF PART 2 prac/WPF PART 2 prac.slnx"

    steps:

    # ==========================================
    # STEP 1: Checkout repository
    # Downloads repo contents
    # ==========================================
    - name: Checkout Repository
      uses: actions/checkout@v4


    # ==========================================
    # STEP 2: Install .NET 10 SDK
    # Matches your project framework
    # ==========================================
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true


    # ==========================================
    # STEP 3: Display repository files
    # Helps debug folder/path problems
    # ==========================================
    - name: Show Repository Files
      run: Get-ChildItem -Recurse


    # ==========================================
    # STEP 4: Restore dependencies
    # Uses matrix solution path
    # ==========================================
    - name: Restore Dependencies
      run: dotnet restore "${{ matrix.solution }}"


    # ==========================================
    # STEP 5: Verify formatting
    # Checks formatting consistency
    # ==========================================
    - name: Verify Formatting
      run: dotnet format "${{ matrix.solution }}" --verify-no-changes


    # ==========================================
    # STEP 6: Build solution
    # Builds in Release mode
    # ==========================================
    - name: Build Solution
      run: dotnet build "${{ matrix.solution }}" --no-restore --configuration Release
